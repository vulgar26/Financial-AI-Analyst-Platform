# 集成测试（Testcontainers）：密钥占位即可，不向公网发起真实 LLM 调用
spring:
  ai:
    # chat 主模型 Anthropic：占位非空 base-url + 占位 key，仅让 bean 能创建。
    # AnthropicApi 构造时校验 base-url 非空，空串会拖垮 ApplicationContext；
    # 测试不触发真实 chat 调用，所以占位即可。
    anthropic:
      base-url: http://localhost/anthropic-placeholder-not-used
      api-key: sk-ant-test-placeholder-not-used
    dashscope:
      api-key: sk-test-placeholder-not-used-in-these-tests

app:
  knowledge:
    # 集成测试不预灌种子知识：KnowledgeInitializer 启动期会对种子文档做真实 DashScope embedding，
    # 测试只有占位 api-key → 401 直接拖垮 ApplicationContext。需要向量检索的用例自行 mock EmbeddingModel。
    init:
      enabled: false
  conversation:
    require-registration: false
    # 短于生产默认，便于断言「超长 query」400 而不把超长字符串塞进每个用例
    max-query-chars: 256
  security:
    jwt:
      secret: test-jwt-secret-must-be-at-least-32-chars-long
  eval:
    gateway-key: it-eval-gateway-key
    stub-work-sleep-ms: 0
    # 集成测默认仍开启；单测切片无 JdbcTemplate 时由 ObjectProvider 跳过
    checkpoint-persistence-enabled: true
  agent:
    plan-stage:
      enabled: false
    total-timeout: 300s
    max-steps: 8
    tool-timeout: 15s
    llm-stream-timeout: 60s
  # 集成测试可能多次调登录/业务接口，放宽限流避免 CI 偶发 429
  rate-limit:
    chat:
      requests-per-minute: 1000
    login:
      requests-per-minute: 1000

weather:
  api-key: test-weather-key

logging:
  level:
    root: warn
    com.travel.ai: info
